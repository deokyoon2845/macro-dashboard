name: Daily Data Collection

on:
  schedule:
    - cron: '0 22 * * *'   # KST 07:00 = UTC 22:00
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 기존 데이터 수집 ──────────────────────────────────
      - name: Fetch FRED
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python src/fetch_fred.py

      - name: Fetch yfinance
        continue-on-error: true
        run: python src/fetch_yfinance.py

      - name: Fetch sentiment (CNN F&G)
        continue-on-error: true
        run: python src/fetch_sentiment.py

      - name: Fetch ECOS
        continue-on-error: true
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python src/fetch_ecos.py

      - name: Fetch PyKRX (해외IP 차단 — 실패 무시)
        continue-on-error: true
        run: python src/fetch_pykrx.py

      # ── 투자자산 데이터 수집 ──────────────────────────────
      - name: Fetch portfolio prices
        continue-on-error: true
        run: python src/fetch_portfolio.py

      # ── 뉴스 수집 + AI 분석 ───────────────────────────────
      - name: Fetch news
        continue-on-error: true
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python src/fetch_news.py

      - name: Analyze news with AI
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/analyze_news.py

      - name: Fetch DART disclosures
        continue-on-error: true
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python src/fetch_disclosures.py

      # ── AI 브리핑 + 거래일지 회고 (반드시 마지막) ────────
      - name: Review trade journal
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/review_journal.py

      - name: Generate weekly report (월요일만)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "$(date +%u)" = "1" ]; then
            echo "📊 월요일 — 주간 리포트 생성"
            python src/weekly_report.py
          else
            echo "⏭ 월요일이 아니므로 건너뜀 (오늘: $(date +%A))"
          fi  

      - name: Fetch YouTube
        continue-on-error: true
        run: python src/fetch_youtube.py

      - name: Fetch Telegram
        continue-on-error: true
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION:  ${{ secrets.TELEGRAM_SESSION }}
        run: python src/fetch_telegram.py

      - name: Generate daily briefing
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/generate_briefing.py    

      - name: Generate daily briefing
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/generate_briefing.py

      # ── 데이터 커밋 ───────────────────────────────────────
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%d)"
          git push

     - name: Fetch Trending
        continue-on-error: true
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: pip install beautifulsoup4 && python src/fetch_trending.py     
