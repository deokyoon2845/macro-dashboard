name: Daily Macro Data Collection

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python src/fetch_fred.py
        continue-on-error: true

      - name: Fetch yfinance data
        run: python src/fetch_yfinance.py
        continue-on-error: true

      - name: Fetch PyKRX data
        run: python src/fetch_pykrx.py
        continue-on-error: true

      - name: Fetch CNN Fear & Greed
        run: python src/fetch_sentiment.py
        continue-on-error: true

      - name: Fetch ECOS data
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python src/fetch_ecos.py
        continue-on-error: true

      - name: Health check + alert
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/check_health.py

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update data $(date -u +'%Y-%m-%d')"
          git push
